version: 2.1

# ── Dynamic config: setup workflow ────────────────────────────────────
# The real pipeline lives in continue_config.yml. This setup workflow
# inspects the diff of the pushed commit and sets two pipeline parameters:
#
#   has_any_changes   true if the push contains any changed files
#   has_code_changes  true if any changed file is under aslprep/, scripts/,
#                     docker/, .circleci/, or is a build/config file
#                     (Dockerfile*, pyproject.toml, pixi.lock, tox.ini,
#                     Makefile, .dockerignore)
#
# The continue workflow runs when has_code_changes is true OR when there
# is no diff at all (tag builds, initial clones). A push that only touches
# documentation (README, *.rst, *.md, CITATION.cff, .github/**, etc.)
# leaves has_code_changes false and is skipped.
#
# `[skip ci]` / `[ci skip]` in a commit message is honored natively by
# CircleCI at the VCS webhook level and needs no explicit handling here.

setup: true

orbs:
  # 1.3.0 is the minimum version whose default executor ships Python >= 3.9.
  # Earlier versions (1.1.0, 1.2.x) hit a "Set parameters" failure because
  # the orb's bootstrap pipes `https://bootstrap.pypa.io/get-pip.py` into
  # Python 3.8, which is no longer supported:
  #   https://support.circleci.com/hc/en-us/articles/36392688494747
  path-filtering: circleci/path-filtering@1.3.0

workflows:
  setup:
    jobs:
      - path-filtering/filter:
          base-revision: main
          config-path: .circleci/continue_config.yml
          mapping: |
            .*                 has_any_changes   true
            ^aslprep/          has_code_changes  true
            ^scripts/          has_code_changes  true
            ^docker/           has_code_changes  true
            ^Dockerfile        has_code_changes  true
            ^\.dockerignore    has_code_changes  true
            ^pyproject\.toml   has_code_changes  true
            ^pixi\.lock        has_code_changes  true
            ^tox\.ini          has_code_changes  true
            ^Makefile          has_code_changes  true
            ^\.circleci/       has_code_changes  true
